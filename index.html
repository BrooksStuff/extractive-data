<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extractive Data — Louisiana Datacenter Proliferation</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <!-- Raleway -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Narrative scroll panel -->
  <aside id="narrative-panel">
    <header id="narrative-header">
      <h1>Extractive Data</h1>
      <p class="subtitle">Louisiana Datacenter Proliferation</p>
    </header>

    <nav id="chapter-nav" aria-label="Chapters"></nav>

    <div id="chapter-list"></div>

    <!-- Entry detail view (hidden until marker click) -->
    <div id="entry-detail" hidden>
      <button id="entry-close" aria-label="Close entry">&larr; Back</button>
      <h2 id="entry-title"></h2>
      <p id="entry-meta"></p>
      <div id="entry-body"></div>
      <div id="entry-images"></div>
      <div id="entry-audio-wrap" hidden>
        <audio id="entry-audio" controls></audio>
        <p id="entry-audio-label" class="audio-label"></p>
        <canvas id="waveform-canvas" width="300" height="60"></canvas>
      </div>
      <ul id="entry-sources"></ul>
    </div>
  </aside>

  <!-- Sidebar drawer toggle — hangs off right edge of #narrative-panel -->
  <button id="panel-toggle" aria-label="Hide sidebar">&#8249;</button>

  <!-- Map -->
  <div id="map"></div>

  <!-- p5.js FX canvas (overlaid on map, pointer-events: none) -->
  <canvas id="fx-canvas"></canvas>

  <!-- Charts panel (hidden until toggled) -->
  <div id="charts-panel" hidden aria-label="Data comparison charts">
    <div id="charts-header">
      <h3>Data Comparisons</h3>
      <button id="charts-close" aria-label="Close charts">&#x2715;</button>
    </div>
    <div class="chart-section">
      <h4>Power Capacity (MW)</h4>
      <svg id="chart-power-svg"></svg>
    </div>
    <div class="chart-section">
      <h4>Water Usage (MGal / yr)</h4>
      <svg id="chart-water-svg"></svg>
    </div>
    <div class="chart-section">
      <h4>Public Subsidies (USD)</h4>
      <svg id="chart-tax-svg"></svg>
    </div>
  </div>

  <!-- D3 Timeline -->
  <div id="timeline-wrap">
    <svg id="timeline"></svg>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
  <script src="https://unpkg.com/p5@1.11.0/lib/p5.min.js"></script>
  <script src="https://unpkg.com/howler@2.2.4/dist/howler.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
